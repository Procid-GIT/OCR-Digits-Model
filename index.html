<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
        <div class="header">
            <h1>AI OCR Model Recognition</h1>
        </div>
    </head>
    <body>
        <p id="desc">Put images of individual characters here(eg. A, 1, F, g), in order to submit them to the AI to recognize it.</p>
        <form id="submit" action="/api/predict" method="post" enctype="multipart/form-data">
            <div class="container">
                <div class="upload">
                    <p>Upload here</p>
                    <input type="file" id="imageUpload" name="aiImage" accept="image/*" required>
                </div>
            </div>
            <button type="submit" id="sub">Predict!</button>
        </form>
        <div class="out-zone">    
            <p id="output">No output yet...</p>
        </div>
    </body>
</html>
